<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Daily Activity Journal</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <p class="eyebrow">V0 Daily Journal</p>
        <h1>Daily Activity Journal</h1>
        <p class="lede">
          Keep a rough log of what you did today. The page is intentionally clumsy and plain.
        </p>
      </section>

      <section class="layout">
        <form id="entry-form" class="entry-panel" novalidate>
          <div class="field">
            <label for="entry-date">Date <span class="req" aria-hidden="true">*</span></label>
            <input
              id="entry-date"
              name="date"
              type="date"
              required
              aria-describedby="entry-date-error"
            />
            <p id="entry-date-error" class="field-error"></p>
          </div>

          <div class="field">
            <label for="entry-mood">Mood <span class="req" aria-hidden="true">*</span></label>
            <select id="entry-mood" name="mood" required aria-describedby="entry-mood-error">
              <option value="" disabled selected>Choose a mood…</option>
              <option value="tired">tired</option>
              <option value="okay">okay</option>
              <option value="focused">focused</option>
              <option value="busy">busy</option>
              <option value="grumpy">grumpy</option>
            </select>
            <p id="entry-mood-error" class="field-error"></p>
          </div>

          <div class="field">
            <label for="entry-notes">Activities <span class="req" aria-hidden="true">*</span></label>
            <textarea
              id="entry-notes"
              name="notes"
              rows="7"
              required
              minlength="3"
              maxlength="2000"
              placeholder="Write what happened today..."
              aria-describedby="entry-notes-hint entry-notes-counter entry-notes-error"
            ></textarea>
            <div class="field-meta">
              <span id="entry-notes-hint" class="field-hint">A few words about your day.</span>
              <span id="entry-notes-counter" class="field-counter">0 / 2000</span>
            </div>
            <p id="entry-notes-error" class="field-error"></p>
          </div>

          <div class="form-actions">
            <button type="submit">Save entry</button>
            <button id="clear-form" type="button" class="secondary">Clear form</button>
          </div>

          <p id="form-status" class="form-status" role="status" aria-live="polite"></p>
        </form>

        <aside class="stats-panel">
          <div class="stat-box">
            <span>Total entries</span>
            <strong id="entry-count">0</strong>
          </div>
          <div class="stat-box">
            <span>Words today</span>
            <strong id="word-count">0</strong>
          </div>
          <div class="stat-box">
            <span>Last saved mood</span>
            <strong id="last-mood">none</strong>
          </div>
          <div class="stat-box">
            <span>Most recent date</span>
            <strong id="last-date">-</strong>
          </div>
        </aside>
      </section>

      <section class="journal-panel">
        <div class="journal-header">
          <h2>Saved Entries</h2>
          <button id="seed-sample" type="button" class="secondary">Load sample</button>
        </div>
        <div id="entries" class="entries"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
